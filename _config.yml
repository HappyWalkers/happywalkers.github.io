# Site identity
title: Yunpeng
description: Yunpeng Wang's posts on robotics, machine learning, and distributed systems.
url: https://happywalkers.github.io
baseurl: ""
lang: en

author:
  name: Yunpeng
  bio: >-
    I'm Yunpeng Wang. I work in the autonomous driving industry and earned dual
    M.S.E. degrees in Electrical Engineering and Computer and Information Science
    from the University of Pennsylvania. Before that, I earned a B.Eng. in Internet
    of Things Engineering from Central South University. My interests are robotics,
    machine learning, and distributed systems.
  avatar: /assets/images/avatar-action-full.jpg
  email: mashed.potato.mine@gmail.com
  github: https://github.com/HappyWalkers
  linkedin: https://www.linkedin.com/in/yunpeng-wang-276a1b243/
  cv: /assets/files/Yunpeng_Wang_CV.pdf

# Preserve the URLs published by the existing site.
permalink: date

date_format: "%B %-d, %Y"

# Content processing
markdown: kramdown
highlighter: rouge
excerpt_separator: "<!--more-->"
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Repository metadata and "Edit on GitHub" links
repository: HappyWalkers/happywalkers.github.io
repository_branch: master

# GitHub Pages-supported plugins only.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jemoji

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

sass:
  style: compressed

exclude:
  - CHANGELOG.md
  - Dockerfile.dev
  - Gemfile
  - Gemfile.lock
  - HOW_TO_RELEASE.md
  - LICENSE
  - README-zh.md
  - README.md
  - docker
  - docs
  - jekyll-text-theme.gemspec
  - node_modules
  - package-lock.json
  - package.json
  - screenshots
  - test
  - tools
  - vendor
